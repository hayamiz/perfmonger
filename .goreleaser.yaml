# GoReleaser configuration for PerfMonger.
# Schema reference: https://goreleaser.com/customization/
version: 2

# The Go module root is core/ (module github.com/hayamiz/perfmonger/core),
# there is no go.mod at the repository root.
builds:
  - id: perfmonger
    dir: core
    main: ./cmd/perfmonger
    binary: perfmonger
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    # Inject the version (without leading "v") into main.VERSION at build time.
    ldflags:
      - -s -w -X main.VERSION={{.Version}}

archives:
  - id: perfmonger
    # Publish raw, standalone binaries instead of tar.gz archives, named
    # perfmonger_<os>_<arch> (e.g. perfmonger_linux_amd64). With the "binary"
    # format goreleaser uploads the executable directly; extra files (COPYING,
    # README.md, NEWS.md) are not bundled — they remain in the source archive
    # and the repository.
    formats:
      - binary
    name_template: "perfmonger_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Publish a source code archive alongside the binaries (decision H).
source:
  enabled: true

# Release notes are sourced from NEWS.md and passed via --release-notes,
# so disable goreleaser's git-log based changelog (D3).
changelog:
  disable: true
