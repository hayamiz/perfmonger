name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # goreleaser needs full history (and tags) to compute the version.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      # Gate the release on a green test suite. Build first because pytest's
      # conftest expects the prebuilt binary at lib/exec/perfmonger_linux_amd64.
      - name: Build, vet, and test (release gate)
        run: make build && make vet && make test

      # Extract the top section of NEWS.md (from the first "## " heading up to,
      # but not including, the next one) to use as the GitHub Release notes.
      - name: Extract release notes from NEWS.md
        run: awk '/^## /{n++} n==1{print} n==2{exit}' NEWS.md > /tmp/relnotes.md

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean --release-notes=/tmp/relnotes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
